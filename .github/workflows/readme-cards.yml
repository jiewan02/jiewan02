name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # 매일 00:00 UTC 갱신
  workflow_dispatch: # 수동 실행 허용

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 이 워크플로에만 쓰기 권한 부여 (least privilege)
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&theme=midnight-purple&hide_border=false&include_all_commits=false&count_private=false"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&theme=midnight-purple&hide_border=false&layout=compact&count_private=false"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: README 카드 SVG 갱신" || exit 0
          git push
